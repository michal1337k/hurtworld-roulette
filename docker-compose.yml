
services:
  php:
    build: ./docker/php
    container_name: roulette_php
    volumes:
      - ./backend:/var/www/html
    working_dir: /var/www/html
    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: roulette_nginx
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  db:
    image: mysql:8.0
    container_name: roulette_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: roulette
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  node:
    image: node:20
    container_name: roulette_node
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: tail -f /dev/null

volumes:
  db_data: